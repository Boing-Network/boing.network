name: boing-sdk

on:
  push:
    branches: [main]
    paths:
      - "boing-sdk/**"
      - "examples/native-boing-tutorial/**"
      - ".github/workflows/boing-sdk.yml"
  pull_request:
    paths:
      - "boing-sdk/**"
      - "examples/native-boing-tutorial/**"
      - ".github/workflows/boing-sdk.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boing-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: boing-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify committed dist/ matches TypeScript output
        run: |
          cd ..
          git diff --exit-code -- boing-sdk/dist/ || {
            echo "::error::boing-sdk dist/ is out of sync with src/. Run: cd boing-sdk && npm run build && git add dist && git commit"
            exit 1
          }

      - name: Test
        run: npm test
